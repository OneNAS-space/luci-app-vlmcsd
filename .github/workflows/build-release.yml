permissions:
  contents: write
name: Build OpenWrt Package

on:
  push:
    branches:
      - main
    paths:
      - 'Makefile'
      - '!**/.github/**'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.version }} / ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: openwrt-24.10
            target: x86_64
            suffix: all
          - version: openwrt-25.12
            target: x86_64
            suffix: noarch

    outputs:
      version: ${{ steps.patch_version.outputs.version }}

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6

      - name: 📛 Set PKG_NAME from repo
        run: echo "PKG_NAME=${{ github.event.repository.name }}" >> "$GITHUB_ENV"

      - name: 🧰 Set up luci-app-vlmcsd feed structure
        run: |
          set -e
          # Also add a shim so ../../luci.mk from package/feeds/jackie264/<pkg> works:
          mkdir -p package
          printf 'include $(TOPDIR)/feeds/luci/luci.mk\n' > package/luci.mk

          # LuCI-style layout so ../../luci.mk resolves from applications/<pkg>
          mkdir -p feed/luci/applications/${PKG_NAME}

          # Add shim luci/luci.mk pointing to the official LuCI feed
          mkdir -p feed/luci
          printf 'include $(TOPDIR)/feeds/luci/luci.mk\n' > feed/luci/luci.mk

          # Copy the package sources into the feed subdir (exclude CI and feed itself)
          rsync -av \
            --exclude='.git' \
            --exclude='feed' \
            --exclude='.github' \
            ./ feed/luci/applications/${PKG_NAME}/

      - name: 🩹 Patch Makefile with dynamic version
        id: patch_version
        run: |
          set -euo pipefail
          PKG_VERSION=$(date -u +'%y.%j')
          PKG_RELEASE=$(date -u +'%s' | cut -c6-10)

          echo "Using version: ${PKG_VERSION}-r${PKG_RELEASE}"

          MF="feed/luci/applications/${PKG_NAME}/Makefile"

          sed -i '/^PKG_VERSION/d' "$MF"
          sed -i '/^PKG_RELEASE/d' "$MF"
          if grep -q '^PKG_NAME' "$MF"; then
            echo "Found PKG_NAME, inserting after it"
            sed -i "/^PKG_NAME/a PKG_RELEASE:=${PKG_RELEASE}" "$MF"
            sed -i "/^PKG_NAME/a PKG_VERSION:=${PKG_VERSION}" "$MF"
          elif grep -q '^LUCI_NAME' "$MF"; then
            echo "Found LUCI_NAME, inserting after it"
            sed -i "/^LUCI_NAME/a PKG_RELEASE:=${PKG_RELEASE}" "$MF"
            sed -i "/^LUCI_NAME/a PKG_VERSION:=${PKG_VERSION}" "$MF"
          else
            echo "No PKG_NAME or LUCI_NAME, inserting at top"
            { 
              printf 'PKG_VERSION:=%s\n' "$PKG_VERSION"
              printf 'PKG_RELEASE:=%s\n' "$PKG_RELEASE"
              cat "$MF"
            } > "$MF.new" && mv "$MF.new" "$MF"
          fi
          
          echo "Patched Makefile:"
          grep -E 'PKG_VERSION|PKG_RELEASE' "$MF"
          echo "version=${PKG_VERSION}-r${PKG_RELEASE}" >> $GITHUB_OUTPUT
          
      - name: 🧮 Compute ARCH
        run: |
          echo "ARCH=${{ matrix.target }}-${{ matrix.version }}" >> "$GITHUB_ENV"

      - name: 🏗️ Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v10
        env:
          ARCH: ${{ env.ARCH }}
          FEEDNAME: jackie264
          PACKAGES: ${{ env.PKG_NAME }}
          INDEX: 0
          FEED_DIR: ${{ github.workspace }}/feed
          NO_SHFMT_CHECK: 1
          NO_REFRESH_CHECK: 1
          
      - name: 🔍 Debug build output
        run: |
          echo "=== Build directory structure ==="
          find . -name "*.ipk" -type f 2>/dev/null || echo "No .ipk files found"
          echo "=== bin directory structure ==="
          ls -la bin/ 2>/dev/null || echo "No bin directory found"
          if [ -d "bin/packages" ]; then
            echo "=== packages directory structure ==="
            find bin/packages/ -type f -name "*.ipk" 2>/dev/null || echo "No .ipk files in packages directory"
            echo "=== Full packages directory tree ==="
            ls -laR bin/packages/ 2>/dev/null || echo "No packages directory"
          fi

      - name: 📦 Upload artifact for ${{ matrix.target }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.target }}-${{ matrix.version }}
          path: |
            bin/packages/*/jackie264/${{ env.PKG_NAME }}*.ipk
            bin/packages/*/jackie264/${{ env.PKG_NAME }}*.apk
          if-no-files-found: ignore

  release:
    name: Release ${{ github.repository }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6

      - name: ⬇️ Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets

      - name: 🗃️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Build-v${{ needs.build.outputs.version }}
          files: |
            ./release-assets/**/*.ipk
            ./release-assets/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout custom-packages repo
        uses: actions/checkout@v6
        with:
          repository: OneNAS-space/custom-packages
          token: ${{ secrets.CUSTOM_PACKAGES_TOKEN }}
          path: custom-packages

      - name: Update luci artifacts
        run: |
          set -e
          CURRENT_PKG="${{ github.event.repository.name }}"
          mkdir -p custom-packages/24.10/luci
          mkdir -p custom-packages/25.12/luci
          echo "Cleaning all old versions for $CURRENT_PKG before updating..."
          rm -f custom-packages/24.10/luci/${CURRENT_PKG}_*.ipk
          rm -f custom-packages/25.12/luci/${CURRENT_PKG}-*.apk
          find ./release-assets -type f \( -name "*.ipk" -o -name "*.apk" \) | while read -r f; do
            base=$(basename "$f")
            if [[ "$base" == *.ipk ]]; then
              echo "Deploying $base to 24.10/luci/"
              cp "$f" custom-packages/24.10/luci/
            elif [[ "$base" == *.apk ]]; then
              echo "Deploying $base to 25.12/luci/"
              cp "$f" custom-packages/25.12/luci/
            fi
          done
          echo "=== 24.10 Content ==="
          ls -la custom-packages/24.10/luci/${CURRENT_PKG}* || echo "No IPKs found"
          echo "=== 25.12 Content ==="
          ls -la custom-packages/25.12/luci/${CURRENT_PKG}* || echo "No APKs found"

          cd custom-packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 24.10/luci/ 25.12/luci
          git commit -m "Update $CURRENT_PKG to v${{ needs.build.outputs.version }}" || echo "No changes"
          git push
